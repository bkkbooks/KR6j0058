body:
  text: 西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯真言大智變化品第五爾時世尊大遍照金剛如來觀察一切如來已入寂靜無塵最勝金剛三摩地於此三摩地出已從金剛三昧說一切如來母佛眼大菩薩真言曰唵引婆誐嚩底一嚕嚕二塞普二合嚕三入嚩二合羅四底瑟吒二合五悉駄嚕左儞引六薩哩嚩二合引囉他二合娑引達儞娑嚩二合引賀引七爾時諸佛如來及十地滿心大菩薩眾聞此真言已悉皆歡喜一切魔軍驚怖迷悶唯念大遍照金剛如來今此真言具足大智若有持誦之者能作種種成就事乃至死者使令還命難成能成爾時世尊復入三金剛最上熾盛三昧金剛三摩地從定出已說諸佛母摩摩枳菩薩真言曰唵引商羯哩引一扇引底羯哩引二崛吒崛吒三崛致儞崛致儞四哩伽二合引多野哩伽二合引多野五崛致儞娑嚩二合引賀引六爾時諸佛如來聞此佛母真言已皆大歡喜唯念心金剛如來此真言能成就一切息災增益等法能作擁護乃至能滅一切罪障爾時世尊復入大樂無邊蓮花三金剛心變化三昧金剛三摩地於定出已從三金剛說諸法母白衣菩薩真言曰唵引羯致引一尾羯致引二儞羯致引三羯𪅎羯致引四羯嚕吒微哩曳二合引娑嚩二合引賀引五爾時諸佛如來聞此真言已悉皆出定唯念心金剛如來若人持誦觀想能作一切事能善擁護乃至增長微妙法藏爾時世尊復入覺悟諸天平等三金剛大樂金剛三摩地從定出已說諸佛母大智多羅菩薩真言曰唵引多引哩引一咄多引哩引二咄哩引娑嚩二合引賀引三爾時諸佛及諸菩薩聞此真言皆大歡喜唯念大遍照金剛如來若人持誦此菩薩真言能令世間一切有情而為僕從爾時世尊復入一切如來最上智三摩地於定出已從三金剛說此焰鬘得迦大忿怒明王真言曰那莫悉底哩三合嚩日囉二合引𧹞引一唵引朅朅二佉引呬佉引呬三薩哩嚩二合訥瑟吒二合四薩埵那摩迦五遏西母娑羅六鉢囉輸播引舍賀悉多二合七拶覩哩部二合惹八拶覩哩目二合珂九殺吒左二合囉拏十阿引誐蹉阿引誐蹉十一薩哩嚩二合訥瑟吒二合鉢囉二合拏引鉢賀引哩拏十二摩賀引尾覲曩二合伽引怛迦十三尾訖哩二合跢引那那十四薩哩嚩二合部引多嚩商羯囉十五遏吒吒賀引娑那引禰儞引十六咩引伽囉二合左哩摩二合儞嚩引娑那十七酤嚕酤嚕十八薩哩嚩二合羯哩摩二合引十九親那親那二十薩哩嚩二合滿怛囉二合引二十一頻那頻那二十二鉢囉母捺囉二合引二十三阿引羯哩沙二合野二十四阿引羯哩沙二合野二十五薩哩嚩二合部引旦引儞哩摩二合他二十六儞哩摩二合他二十七薩哩嚩二合訥瑟吒二合引鉢囉二合吠引舍野二十八鉢囉二合吠引舍野二十九曼拏羅末𬽛切身三十吠引嚩莎多𡁠引尾旦引多羯囉三十一酤嚕酤嚕三十二摩摩阿迦引哩焬二合賀那賀那三十三捺賀捺賀三十四鉢左鉢左三十五摩引尾藍末野三十六摩引尾藍末野三十七摩摩三摩野摩褥三摩二合囉三十八吽引吽引發吒半音發吒半音三十九塞怖二合引吒野四十塞怖二合引吒野四十一薩哩嚩二合引賒引波哩布囉哥四十二呬引呬引婆誐鑁引四十三緊唧囉引野西四十四摩摩薩哩嚩二合引哩湯二合四十五娑引達野娑嚩二合引賀引四十六爾時一切諸佛及十地菩薩聞此大智種變化明王真言已歎未曾有唯念大遍照金剛如來此出世大智神通變化焰鬘得迦忿怒明王能降伏大惡眾生若持誦人欲作降伏諸惡法當用一髑髏選擇不損壞無縫兩耳相通圓滿者或一縫至兩縫及耳不通者亦可作法得此髑髏已持誦人依法誦五如來及四親近菩薩真言加持然後取惡人足下土盛髑髏內持誦人以足踏之即誦焰鬘得迦明王真言速得降伏爾時世尊大遍照金剛如來復入大不空最勝金剛甘露忿怒金剛三摩地出此定已從三金剛說尾覲難得迦大忿怒明王真言曰那莫三滿多沒馱引曩引一那謨嚩日囉二合骨嚕二合引駄引野二摩訶引能瑟吒嚕二合引咄羯二合吒三陪囉嚩引野四遏西母娑羅五鉢囉輪播引舍賀娑多二合引野六唵引阿蜜哩二合多軍拏里七朅朅佉引呬佉引呬八底瑟吒二合底瑟吒二合引九滿馱滿馱十賀那賀那十一誐哩惹二合誐哩惹二合十二尾娑怖二合引吒野十三尾娑怖二合引吒野十四薩哩嚩二合尾覲那二合尾那引野剛引十五摩賀引誐拏鉢底十六𡁠引尾旦引多羯囉引野十七吽引發吒半音娑嚩二合引賀引十八爾時一切諸佛及大菩薩聞此大忿怒明王真言已歎未曾有一切魔眾悉皆驚怖唯念大遍照金剛如來若持誦人欲作發遣諸惡魔法者當取旋風所吹樹葉於彼葉內畫明王輪如是畫已持誦者取惡魔足下土置於輪中以足踏之即誦明王真言彼惡魔等速自遠離爾時大遍照金剛如來復入寶光變化大智金剛三摩地出此定已從三金剛說鉢囉研得迦忿怒明王真言曰那莫三滿多沒馱引曩引一唵引𡁠那哩徵知以反二吒吽引吽引發吒半音娑嚩二合引賀引三爾時諸佛及諸菩薩聞此明王真言已歎未曾有唯念大遍照金剛如來若人於此真言依法持誦能降伏夜叉羅剎緊那羅部多娑健馱及宿曜等爾時世尊復入甘露寶功德藏金剛三摩地出此定已從三金剛說鉢訥鬘得迦忿怒明王真言曰那莫三滿多沒馱引曩引一唵引吽引吽引吽引二跢引嚕羅三尾嚕羅四薩哩嚩二合尾沙伽引怛哥五入嚩二合里多尾塞普二合陵誐六遏吒吒賀引娑計引薩哩七薩吒引跓引波八嚩日囉二合窟囉儞哩伽二合引多九左里多嚩酥馱引怛羅十儞濕嚩二合引娑十一摩嚕覩引得叱二合鉢多二合十二馱囉尼引達羅毘引沙拏十三遏吒吒賀引娑十四阿波