者當用人骨為橛或佉禰囉木或鐵等可得為橛橛既成就當用印相所謂大遍照金剛如來根本印或寶生佛印或焰鬘得迦明王印或吒枳明王印及大力明王印等然後觀想金剛薩埵菩薩遍身光明即作除魔法持誦者依金剛薩埵菩薩儀想彼魔身從頂至足遍身釘金剛橛乃至滿虛空界皆是金剛橛如是依法觀想持誦三業相應此金剛薩埵大菩薩能釘一切魔爾時世尊大遍照金剛如來復入身智變化金剛三摩地出此定已從身口意說身金剛三昧無二真言曰唵引親那親那一賀那賀那二那賀那賀三儞引鉢多二合嚩日囉二合作訖囉二合四吽引發吒半音五時阿闍梨作金剛印觀想遍照佛復想此真言如金剛橛作釘橛勢作法之間乃至諸佛皆出禪定歎未曾有一切魔眾悉皆降伏若不依此當即破壞爾時世尊大遍照金剛如來復入大心大智金剛變化金剛三摩地出此定已從身口意三金剛說大忿怒橛真言曰唵引嚩日囉二合囉惹吽引一時阿闍梨誦此真言已想五股金剛杵遍滿虛空以此真言力降伏諸魔復想作釘橛勢釘橛之間一切魔眾悉皆降伏若不依此法當即身壞爾時世尊大遍照金剛如來復入無量壽語三昧變化金剛三摩地出此定已從身口意三昧說此釘橛真言曰唵引紇哩二合引一唵引部哩普二合嚩入二時阿闍梨誦此真言已觀想蓮華印光明熾盛以真言印相降伏魔冤想如釘橛勢如是依法持誦一切魔眾悉皆降伏若不依法必得除滅此真實金剛橛假使滿虛空皆是諸魔冤悉能釘之爾時大遍照金剛如來說此祕密觀想釘橛之法彼如來善利眾生心大歡喜而說頌曰祕密妙法第一義總攝甚深真實理最上難思寂靜句是即金剛大智橛善釘一切邪魔呪乃至不受佛勅者如是諸佛釘橛法皆從真實妙智生爾時世尊大遍照金剛如來說此頌已復入一切微妙字金剛三摩地出此定已說日前菩薩真言曰唵引摩引哩引唧曳二合引一禰引嚩多引曳娑嚩二合引賀引二爾時一切佛及諸菩薩聞此真言悉皆歡喜此真言法能作一切事能除冤賊難若人依法受持於道路行一切諸惡不能得便爾時世尊大遍照金剛如來復入降諸惡魔善度一切眾生大智力最勝金剛三摩地出此定已說降伏大千界菩薩真言曰唵引摩賀引薩賀娑囉二合鉢囉二合末哩那二合儞引一嚩囉悉地那引曳計二摩尼嚩日哩二合引三吽引發吒半音娑嚩二合引賀引四爾時世尊說此真言已一切佛剎悉皆震動一切菩薩悉出禪定一切諸魔悉皆驚怖受大苦惱如火燃身而白佛言我等諸魔以真言大威力故悉受苦惱從今已後所在之處若有持誦此真言者誓不於彼為其魔難長作擁護令增壽命爾時世尊復入救帝釋降伏大力阿修羅最勝三摩地出此定已說最上寶幢陀羅尼曰唵引婆誐嚩底一特嚩二合惹引仡囉二合計引喻哩二鉢囉塞𭔞切身下同尾特網二合薩那羯哩三莎塞𭔞切身鉢哩播引羅儞四烏勒哥二合目契五朅朅六佉引呬佉引呬七鉢囉塞引𭔞切身八阿難多部𡁠引那九阿難多目契那十鉢囉二合賀囉十一鉢囉二合賀囉十二吽引發吒半音娑嚩二合引賀引十三爾時世尊說此大寶幢陀羅尼已所有佛剎悉皆震動諸大菩薩悉出禪定一切夜叉羅剎及諸魔眾受大苦惱唯念大遍照如來俱白佛言世尊我等魔眾以大明力故受大苦惱如火燃身從今已後受佛三昧願作一切勝善之事爾時世尊大遍照金剛如來復入安隱一切胎藏變化金剛三摩地出此定已說大隨求菩薩真言曰唵引摩尼達哩引一嚩日哩二合尼二摩賀引鉢囉二合底薩哩引娑嚩二合引賀引三爾時世尊說此真言已所有一切大惡魔冤及諸大力鬼神等常於人間侵害有情食彼胎子者聞此大明悉皆驚怖如火燃身往詣佛所悉皆禮足白佛言世尊我等諸魔受佛三昧從今已後不害眾生不食胎子擁護有情為作安隱爾時世尊大遍照金剛如來復入持世大智金剛三摩地出此定已說持世菩薩真言曰唵引嚩酥駄引哩引一摩賀引嚩酥駄引囉二沒哩二合瑟致二合儞播引底儞三嚩酥娑嚩二合引賀引四爾時世尊說此真言已所有一切魔眾悉皆驚怖唯念大遍照金剛如來而白佛言世尊若人於此持世菩薩真言受持讀誦書寫供養及稱菩薩名號者我等魔眾為彼眾生雨眾珍寶令獲富貴爾時世尊大遍照金剛如來復入一切方便調伏金剛三摩地出此定已說閃電熾盛光大羅剎女心真言曰唵引勞轉舌呼捺哩二合尼一鉢囉二合酤必多贊尼引二摩賀引微引誐達哩三尾捺與二合𡁠吸微二合引摩呼引捺哩勞同上捺哩二合五割播引羅摩引邏引駄引哩尼引六惹吒引末酤吒曼尼帝引七那引那引鉢羅二合訶囉拏達哩八吽引吽引九發吒半音發吒半音十薩哩嚩二合怛他引誐多三摩野摩褥娑摩二合囉十一酤嚕酤嚕十二吽引鉢囉二合摩哩那二合野十三薩哩嚩二合設咄嚕二合𧹞引十四輸引尼當必嚩十五鉢囉二合贊拏微引誐達哩十六鉢左多鉢左多十七尾枳囉尾枳囉十八舍引怛野吽引十九那賀那賀二十薩哩嚩二合設咄嚕二合二十一薩哩嚩二合訥瑟鵮二合引儞訖零二合爹二十二鉢囉二合娑引那野吽引二十三摩賀引微引誐嚩底二十四入嚩二合羅入嚩二合羅二十五吽引發吒半音二十六阿母剛彌引二十七嚩舍摩引那野娑嚩二合引賀引二十八爾時世尊說此大閃電熾盛羅剎女心真言已所有一切諸大魔冤悉皆驚怖受大苦惱如火燃身時持明人欲作此法者先用屍衣以血或赤土於屍衣上畫羅剎女形像已焚安悉香用赤色花及赤飲食出生供養已持誦心真言八百遍然後以此畫像密埋於尸陀林地及稱冤家名如是埋像之間所有魔冤等悉皆禁縛復成魑魅等法爾時世尊大遍照金剛如來復入訶利帝夜叉女善作歡喜眾成就金剛三摩地出此定已說訶利帝夜叉女真言曰唵引訶引哩引帶引摩賀引藥叱尼引拽引一訶囉訶囉二薩哩嚩二合播引煬引三薩哩嚩二合藥叱尼引四鉢囉二合吠引舍儞娑嚩二合引賀引五爾時世尊說此訶利帝大夜叉女真言已告諸眾言此真言能令諸夜叉女等為持誦者作一切成就時持誦者作此法時觀想忿怒明王八輻輪輪中有訶利帝夜叉女及輪八輻上有八大夜叉女想已復想自身以鉤鉤召如是諸夜叉女等皆來現前作成就事爾時世尊大遍照金剛如來復入銷除一切病最勝智金剛三摩地出此定已說鉢蘭拏舍嚩哩菩薩真言曰唵引必舍引唧一鉢蘭拏二合舍引嚩哩二薩哩嚩二合摩引哩鉢囉二合設摩儞引三吽引發吒半音四爾時世尊說此真言已所有佛剎皆悉震動一切夜叉羅剎能作魔者皆悉驚怖迷悶躄地時持誦者欲作息災法當用吉祥草脂麻乳汁及吉祥花果樹枝長十二指者為柴依息災護摩法作於護摩復想此菩薩遍滿虛空降甘露雨所有魔嬈悉皆除滅
