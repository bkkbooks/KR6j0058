body:
  text: 西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯印相大供養儀品第六爾時世尊大遍照金剛如來告金剛手菩薩言汝今諦聽當為汝説三金剛大智所生祕密印相法若持誦者依法結印能滅一切罪業復能觀想真理即得證於無上菩提何況別求成就之事復次作印相法先以二手作拳二拇指平竪立此是大遍照如來安身印不改前印以左手拇指入掌內右手拇指竪立此是無量壽佛安語印不改前印以右手拇指入於掌內左手拇指竪立此是阿閦佛安心印復以二手作拳左手頭指竪立入右拳內此是大遍照金剛如來根本印復次半跏趺坐垂左足左手安臍輪垂右手觸地此是阿閦佛根本印不改前印以右手作施願相此是寶生佛根本印不改前印以二手安臍輪如禪定相此是無量壽佛根本印不改前印以右手作無畏相此是不空成就佛根本印復次以二手作金剛縛二中指竪立如針此是薩埵金剛菩薩印不改前印二中指微屈頭節如寶形此是寶金剛菩薩印不改前印二中指作環如蓮花形此是法金剛菩薩印不改前印二中指如羯磨杵此是羯磨金剛菩薩印復次以二手作合掌二頭指捻二拇指頭如目形此是佛眼菩薩印復次以二手作金剛縛二中指展舒二頭指捻中指第三節如金剛形此是摩摩枳菩薩印復次以二手合掌令十指頭各不相著微屈如蓮花形此是白衣菩薩印復次以二手作合掌二頭指捻中指甲二拇指入掌內如優鉢羅花形此是多羅菩薩印復次以二手作合掌二頭指捻於中指中節如環二拇指安二邊此是尊那菩薩印復次以二手作金剛縛二頭指與拇指各頭節微屈此是寶光菩薩印復次以二手展舒二拇指捏小指甲餘指不相著如金剛形此是顰眉菩薩印復次以二手作金剛拳小指與頭指相交如鎖此是金剛鎖菩薩印復次以二手作拳二拇指與小指如針二中指與無名指相背二頭指屈向拇指如環拇指亦微屈如輪此是焰鬘得迦明王印復次以左手作金剛拳安心頭指竪立右手如𢼛勢此是鉢囉研得迦明王印復次以二手作金剛拳二小指相交如鎖二頭指相背如針安於額上此是鉢納鬘得迦明王印復次以二手拇指捏小指甲餘指如金剛形二手相交安於髆上此是尾覲難得迦明王印復次以左手拇指無名指與小指相捻指甲如劍鞘右手如取劍勢此是不動尊明王印復次二手作金剛拳右手在上二拳相背二小指相交如鎖二頭指竪立如降伏勢此是吒枳明王印復次以左手作金剛拳安心頭指竪立右手展舒頭指亦竪立如杖勢此是儞羅難拏明王印復次以左手安心右手作拳如揮拳勢此是大力明王印復次以二手各作拳頭指拇指中指微展舒如開花勢此是慈氏菩薩印復次以二手作合掌頭指捻無名指甲如優鉢羅花勢此是妙吉祥菩薩印復次以左手安臍輪右手如象勢此是香象菩薩印復次以左手作拳竪立如幢右手如幡勢此是智幢菩薩印復次處於賢座二手合掌安心此是賢護菩薩印復次以二手展舒如龜行勢指鉤於掌內此是海意菩薩印復次以左手作金剛拳安心右手作施願相此是無盡意菩薩印復次以左手作拳安於臍輪右手作彈指此是辨積菩薩印復次以二手如圓滿蓮花形此是得大勢至菩薩印復次以二手作磔散勢此是除一切罪障菩薩印復次以二手作合掌如打擲勢此是破一切憂暗菩薩印復次以二手指展舒如熾焰勢此是熾盛光菩薩印復次以右手作施願相左手如月輪勢此是月光菩薩印復次以二手如持閼伽瓶作灌頂勢此是甘露光菩薩印復次以左手作金剛拳安臍輪右手亦作拳旋轉捫摸虛空勢此是虛空藏菩薩印復次以左手展舒右手頭指拇指安左掌中此是除蓋障菩薩印復次以左手作金剛拳安心竪立頭指右手亦作金剛拳如揮拳勢現忿怒相此是鉢蘭那舍嚩哩菩薩印復次以左手拇指與頭指如持物勢右手如持針勢此是日前菩薩印復次以二手如蛇頭形安頂上如繖蓋勢微現忿怒相此是穰虞梨菩薩印能除一切毒復次如前吒枳明王印以二頭指竪立此是降三界明王印不改前印右頭指如鉤現忿怒相此是金剛明王鉤印用此印法可請召一切如來復次以二手作金剛拳小指屈如牙二手相交安口門如牙及出舌現忿怒顧視此是金剛牙明王印不改前印屈二小指二頭指如鉤勢現忿怒顧視此是金剛拏吉儞印復次以二手作金剛拳二頭指展舒二手相交於頭上磔散此是曼拏羅印不改前印良久之間亦磔散手此是開門印復次以二手作拳二拳相交以脅挾之現忿怒顧視右繞而行此是破一切惡曜印復次以左手覆舒右手覆安左手背二拇指動搖此是破阿修羅呪法及降伏阿修羅女印復次以二手拇指與小指相交如鎖餘指如幡勢現大忿怒相此是嚩日囉二合播多羅明王印復次以左手作金剛拳頭指展舒此是金剛橛印復次以二手作金剛縛二頭指展舒如釘橛勢此亦是金剛橛印復次以右手作金剛拳如釘椎勢此是椎印亦成骨朵印復次以二手作金剛拳二頭指展舒復如金剛縛勢此是一切如來金剛縛印復次以二手作金剛拳復作揮拳勢此是金剛訖囉二合哥左印復次以二手如持月勢捫摸於面復展舒現忿怒顧視此是閃電熾盛羅剎女印復次以二手相交如鎖頭指與拇指竪立如持刀勢此是金剛刀印此印能止風雨復次以二手作拳二頭指屈如環現大忿怒相復展舒二手此是破壞他呪法印復次以二手覆拇指入掌內餘指動搖如翅翼翹一足而立出舌現忿怒顧視連誦吽字依法行步此是金翅鳥印結此印時能解三界毒復次以二手作金剛拳復如四方射箭勢此是金剛箭印此印能破壞他軍復次以二手作拳二中指如針復屈如寶形二拇指展舒捻二頭指甲如環此是佛輪印此印能救軍陳之難復次以左手作拳中指如針右手如開敷蓮花此是訶邏曷羅菩薩印復次以二手作拳二小指相交二頭指如針相背安於額上此是呬嚕哥明王印此入尸陀林能破諸鬼神復次以左手如持髑髏勢右手如持三叉勢此是自在天印復次以左手展舒指不相著如無畏勢拇指入掌內右手作拳竪立如持寶棒勢此是那羅延天印復次以二手作展舒如蓮花形此是大梵天印復次以二手作花合掌此是一切族母印如是薩埵金剛等四親近菩薩所結印相當與灌頂印同如是阿闍梨隨曼拏羅諸賢聖印法一一了知已復於曼拏羅祕密供養圓滿了知所有戲鬘歌舞香花燈塗隨彼菩薩各各供養作獻物勢如是種種裝嚴及種種殊妙衣服幢幡繖蓋閼伽水等悉皆各作獻物勢已手持鈴杵即振鈴而開曼拏羅門誦此真言曰唵引嚩日囉二合健致引羅拏一鉢囉二合囉拏二三鉢囉二合囉拏三沒馱叱怛囉二合左引里儞引四鉢囉二合倪也二合引播引囉彌多引五那引捺莎婆引吠引六嚩日囉二合達囉紇哩二合那野七散都殺尼引八吽引吽引吽引九時阿闍梨誦此真言已以右手擲金剛杵左手振金剛鈴即以歌讚供養賢聖如是依金剛大乘作最上真實供養已諸佛賢聖悉皆歡喜彼諸如來即説頌曰若人斷除諸疑惑常作菩提觀想行恆以清淨身口意供養聖賢為最上若人不斷諸疑惑而復信重緣覺乘修習小乘聲聞教彼人供養非最上依法供養諸如來聖賢歡喜歎希有爾時諸佛如來讚遍照佛言善哉善哉能為衆生分別顯示瑜伽大教菩提之法而説頌曰金剛遍照圓明智隨機開演大乘門能令除斷貪瞋癡觀想菩提微妙理善哉無上大乘法甚深方廣濟群生如是真實法寶藏彼佛大覺能宣演爾時諸菩薩聞諸如來出微妙音頌讚佛已皆大歡喜亦以伽陀讚遍照佛曰佛身無邊無生滅無住無説無文字寂滅離相如虛空有相是佛方便説所説教相福含生引導令登菩薩位菩薩獲居佛剎中皆因祕密三摩地時諸佛及大菩薩各以伽陀讚歎佛已爾時大遍照金剛如來説妙歌讚嚩惹虎惹引拏一一穌訶烏鉢帝引二婆引嚩尾婆引網三末虎烏鉢帝引四惹馨吠武母切嚕阿努五鉢茶謨剛㘑引六戌馱尾戌提引七𩕳彌阿沒提引八末虎尾訶嚕微孕二合九滿馱呼摩引朗十鉢那摩訶當當十一摩引野惹引朗十二嚩引仵鉢半際引十三恥烏路伊薩嚕十四薩哩微引二合遏朅哩引盤引妮烏輸薩嚕十五禰拏阿努捺彌遏烏十六薩呬烏摩引儞引微引十七末虎尾訶哩提十八伊拏呬阿酤引微引十九穰呬遏拏囉引阿努二十穌囉遏薩訶引吠引二十一入舞二合引尾一遏薩體引二十二薩提遏烏婆引吠引二十三那引呬拏喝體二十四羯哩洗嚩儒仁祖切二十五嚩引彌引健吒引囉尼阿穌薩儒上同二十六薩阿邏儞引微引二十七彌里阿引嚩儒引三摩夜引播引微引二十八割哩阿引割儒引二十九伊哥引陵誐拏三十嚩引嚩拏喝他引三十一微引阿努囉引阿拏三十二穌囉阿薩末他三十三帝引阿引酤引吠引三十四潑羅虎摩引隸引三十五怛馨左烏提引吻微引切達一三十六蘇囉阿引嚩拏引三十七儒伊馨倪引三十八伊馨儒引婆引晚帝引三十九穌囉阿嚩惹引虎四十帝引窣虎播引晚帝引四十一爾時大遍照金剛如來説此妙歌讚已復説供養真言曰唵引阿耨怛囉一薩哩嚩二合布引惹引彌引伽二烏訥誐二合帝引塞頗二合囉呬𤚥引三誐誐那剛吽引四發吒半音娑嚩二合引賀引五時持誦者誦此真言三遍已想此供養遍滿虛空即成一切供養獻於一切賢聖皆大歡喜佛説瑜伽大教王經觀想菩提心大智品第七爾時一切如來及諸菩薩異口同音勸請世尊大遍照金剛如來唯願慈悲演説甚深無上大覺菩提心法爾時世尊受彼請已而告衆言諦聽諦聽我今説之佛言此菩提心即是身相身相性空即真菩提身既無別語相亦然爾時諸佛如來聞佛説已住一切如來身口意三密相中心離取捨而説頌曰希有普賢身語心本無生滅亦無著體無文字及諸相遠離戲論絶分別爾時諸佛説此頌已時世尊阿閦如來入語相金剛三摩地從定出已説菩提心本離生滅湛然清淨如虛空故而説頌曰菩提心本無生滅性淨無法無所受無著無染如虛空是即堅固菩提心如是阿閦如來説此頌已爾時寶生如來入一切如來無相金剛三摩地從定出已説菩提心頌曰此性本來無有性無相無為體凝寂此法源從無我生是即堅固菩提心如是寶生如來説此頌已爾時無量壽如來入最勝熾盛金剛三摩地從定出已説菩提心頌曰法界本來無所生寂然無性亦無相洞達空理無邊際此即菩提真實心如是無量壽如來説此頌已爾時不空成就如來入無上智金剛三摩地從定出已説菩提心頌曰諸法自性皆清淨本來寂靜無所有亦無菩提亦無佛及彼衆生并壽者有見如夢如幻化無見之見亦復然離有離無取捨亡是即堅固菩提心如是不空成就如來説此頌已爾時慈氏菩薩等諸大菩薩聞諸如來以金剛身語心説清淨菩提心法歎未曾有而説頌曰唯佛最上尊善説微妙法法從無我生稽首菩提心字從無字生佛從無相顯一切如幻夢稽首金剛心如是慈氏菩薩等説此頌已爾時大遍照金剛如來復説觀想法持誦者先跏趺坐觀想五趣處與非處以淨三業真言普皆清淨令住淨法然後想自本心為其吽字吽字變成佛身佛身即自身現貢高勢以金剛鉤請召賢聖已而現三昧作結界法然後依法獻座及獻閼伽等種種供養令一切賢聖生大歡喜然後自作相應法此有三種一祈求諸佛慈悲加護想微妙字化成佛相二起自本身清淨菩提心成大智佛三所成佛相及菩薩等依法了知印相圓滿如是三種相應儀法具足剎那之間神通變化成畢竟大智復次持誦者先安住三昧已發大菩提心洗除心垢誦淨三業真言一剎那中心垢清淨以真言威力開發菩提心觀一切法如幻如化本自性空無有堅實依此菩提心想為月輪於月輪上想有唵字為身金剛次想阿字成語金剛吽字成心金剛如是三字成金剛身語心已想鉢字化成蓮花乘此蓮花相好具足想於佛身色相執捉儀法已想自身作貢高勢我身即是金剛如來一切裝嚴圓光照曜如是本身即是畢竟菩提大智然後依五如來法以真言印相為弟子甲胄器仗即與授於灌頂是時阿闍梨觀想諸佛遍滿虛空作大神變復想十方各有明王部領四兵一切諸佛及大明王各結本印手持器仗遍滿十方作種種神變此是五如來演暢瑜伽真理四諦六度諸波羅蜜等如羯磨金剛作大利樂救濟衆生時阿闍梨觀想諸佛遍滿虛空各坐蓮花諸相圓滿一切裝嚴復想諸佛及彼花座相合為一此則佛身一多無二理事無礙法界同體然後依法儀則獻戲鬘歌舞香花燈塗等種種供養或作於觀想心有疲倦當即持誦須正定身心離諸散亂不急不緩文句周正或持誦疲倦即持鈴杵依法擲杵振鈴而作供養已發送賢聖乃至作己身擁護隨意行住或復再欲請召賢聖當用百字真言時阿闍梨如是依法觀想持誦如天滿月無有虧盈不久之間證大菩提此人圓滿金剛乘成就羯磨法亦如寶生佛等五部如來為一切明主
