body:
  text: 西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯序品第一如是我聞一時世尊大遍照金剛如來在淨光天大樓閣中彼之樓閣衆寶裝嚴清淨嚴飾金剛寶柱金剛鈴鐸微風吹動出微妙音復有種種殊妙供養以金剛輪寶等而為裝嚴此是遍照如來種種變化所成乃至如來大智所生諸佛所謂阿閦佛大寶生佛無量壽佛不空成就佛等復次於四面門出生諸菩薩衆及諸賢聖忿怒明王及唧吒唧致訥多訥帝緊羯囉緊羯哩等無數眷屬彼佛安住三摩地常不捨大智大慈大悲發大精進救度衆生於彼會中復有無數天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等無數眷屬圍繞世尊大遍照金剛如來爾時世尊於會衆中顧視金剛手大菩薩已放大光明普照衆會其光復還入於佛身爾時金剛手菩薩摩訶薩從座而起偏袒右肩踊躍歡喜瞻仰尊顏擲金剛杵右膝著地合掌恭敬作禮世尊而白佛言何因何緣放大光明諸佛如來若無因緣非放光明今見此光我等衆會悉皆驚怪唯願世尊作師子吼為我等故而與宣説爾時世尊受金剛手菩薩請已入大三摩地其名大智變化瑜伽大教王於一切教中最上最尊所作之法不難成就此金剛智大樂方便一切真實藏善作最勝智慧方便大樂金剛大變化金剛三摩地爾時世尊從三摩地出已説瑜伽大教王經三昧曼拏羅及種種法所謂幀像法觀想法持誦法作忿怒儀顧視法三摩地法鉤召法禁伏法打諸惡魔法期剋法病患法熱惱法成事法究竟法灌頂法阿闍梨儀相法攝受弟子法如是種種祕密教法我今解説汝等一切志心諦聽爾時彼一切如來及諸菩薩乃至衆會受教而聽爾時世尊而説偈曰先須親近阿闍梨所作諸法皆能成若不親近阿闍梨所作諸法不可就我今説彼闍梨德汝諸菩薩及衆會應當志心而聽受尊重律儀大智慧忍辱淳直無懈怠善解密句及相應粉壇儀式法則等能了真實十種義施諸衆生常無畏恆樂大乘祕密法悉能了知諸外教持戒修行具律儀通達甚深大乘法能攝祕密真實義若能具足前儀法是故名為阿闍梨若無慈悲行利益亦無正信心懈怠破戒散亂不律儀見聞教法而誹謗如是愚惡無善根不堪行法為師教若具如前儀相法當為弟子親教師此可粉壇為闍梨一切教法令指授所説密句皆能成弟子具德亦如是常樂禪定微妙法恭敬孝順阿闍梨恆以供養諸賢聖云何承事阿闍梨如見諸佛等無異常持金剛阿闍梨當是寶生大如來如是闍梨大智海出如意珠施大財常讚闍梨大功德勿見過失及謗毀如是尊重得法成違法輕慢終不就若人驀踏於師影彼人壞塔罪無異所作所求皆不成諸佛賢聖皆不許勿令毀謗阿闍梨乃至夢中亦不得若有愚癡謗闍梨常被諸魔來驚怪如是惡業愚癡人智者宜應常遠離所説地獄阿鼻等墮彼地獄無出期謗阿闍梨獲此果是故志心求菩提供養承事阿闍梨恭敬尊重常孝順能施難思最上果佛説瑜伽大教王經曼拏羅品第二爾時世尊大遍照金剛如來顧視衆會已入大瑜伽智變化最上祕密金剛三摩地從定出已佛告金剛手大菩薩汝今諦聽金剛手此瑜伽大教王經大曼拏羅王一切曼拏羅中最上最尊其名大智光明藏金剛能成曼拏羅若復有人於此曼拏羅中受灌頂者彼人當受一切曼拏羅中灌頂法佛告金剛手菩薩若復有人見此曼拏羅中五色粉彼人得恭敬供養一切如來若復有人入此曼拏羅中彼人如入諸佛剎中得一切如來授成佛記時阿闍梨先用結界法依法儀則擁護己身及用一切莊嚴之具嚴飾其身然後作忿怒顧視本身忿怒明王右手擲金剛杵左手執金剛鈴振動作金剛步旋繞而行曼拏羅地口誦吽字然後告言我今發遣一切諸魔乃至天人阿修羅等言已復想本身如忿怒明王即誦此真言曰呵波娑蘭覩跋晚多一曳引枳銜禰引嚩引酥囉二藥叉囉引叉娑三必隸二合多必舍引左四阿波三摩二合引囉部引多五拏引枳儞引烏娑多二合引囉迦六摩賀羅哥七摩賀里迦引八摩賀引哩提二合迦引訥左囉九鉢哩沙二合那引誐嚕拏緊那囉十緊布嚕沙滿怛囉悉馱引十一阿怛囉二合必哩二合體尾引鉢囉二合禰引世十二引阿目迦引左引哩曳二合拏十三阿目迦室捨寫十四三冒地波哩布蘭拏二合阿哩湯二合十五薩哩嚩二合薩埵十六阿努怛囉倪也二合曩邏婆呬引都十七阿目迦曼拏羅囉引惹引曩十八摩引里詰多摩夜二合彌底十九怛禰引嚩訥嚩二合日囉二合達囉引倪也二合率嚕二合埵引二十尸竭囉彌引嚩引波訖囉二合摩多二十一踰引曩鉢訖囉二合摩底二十二怛寫嚩日囉二合播引尼二十三鉢囉二合入嚩二合里多二十四酤必多吽哥引囉嚩那曩二十五阿引禰引鉢多二合鉢囉二合必帝二合曩二十六摩賀引倪也二合引曩嚩日哩二合拏二十七謀引哩馱曩三合設多馱引二十八尾羯哩引欲哩底二十九時阿闍梨誦此真言三遍已如前作金剛步旋繞而行結界發遣諸魔成金剛地然後行如左舞踏勢及右舞踏勢每舍珂曼拏羅勢平足立勢龜步勢金剛嚩日嚕咄羯哩沙拏勢翹足舞勢旋網舞勢師子步勢師子變身勢金剛鎖勢金剛索勢金剛忿怒勢金剛鉤勢金剛舞勢金剛陪囉嚩勢金剛吠多梨步勢金剛骨朵勢拶覩哩目珂地瑟吒那步金剛軍拏梨步幻化步金剛塞怖吒步大力鉤步金剛牙步金剛笑步金剛鈴步復作持劍勢持金剛勢持輪勢持杵勢持幡勢持索勢持蓮華勢持杖勢作無畏勢持鉤勢持牌勢持槍勢持弓勢挽弓勢射箭勢持頻尼波羅旋繞而行勢施願勢持爍訖帝勢持羯諾野勢頂禮勢入定勢金剛坐勢蓮花坐勢結跏趺坐勢無畏坐勢賢坐勢蹲坐勢戲坐勢現前勢背向勢時阿闍梨作如是一一行步坐勢已用無邊無能勝明王乃至大力明王等即依法作橛打曼拏羅地圍結界十方如是作已復想曼拏羅地即成金剛地遍滿熾盛如是觀想已時阿闍梨即稱己名同誦吽字如是微妙字於一切教中最上最尊然後以本真言依法祈請地天真言曰怛網二引禰引尾娑引叱部多引悉一薩哩嚩二合沒馱引努多引以曩引二左哩也二合引那野尾試引尸引數三部引彌播引囉彌多引蘇左四薩哩嚩二合悉提鉢囉二合沒哩二合𠆙引切身哩湯二合五曼拏蘭左隸引珂夜引藐憾六時阿闍梨誦此真言三遍已運至誠心復請召諸佛如來真言曰三滿多引訶囒覩𤚥引沒馱一迦引嚕拏呬多際怛薩二部引彌引波哩仡囉二合賀迦引哩也二合三薩補怛賴二合薩賀阿引誐摩四時阿闍梨誦此真言三遍已於曼拏羅地中間以塗香作圓相曼拏羅作此曼拏羅時當誦大輪明王真言然後請召諸佛賢聖獻大種種殊妙供養祈求諸佛而作歡喜時阿闍梨出曼拏羅外於十方出生然後弟子經宿入於曼拏羅中依法作擁護以香水灌頂復用塗香塗於心中想己心中羯磨杵右手繫擁護線與齒木揩牙地鋪吉祥草加持已安座而坐時阿闍梨與弟子受三歸依懺悔罪障回向發願乃至弟子以身命布施發大菩提心即説三歸伽陀曰我今歸敬於三寶我佛曠劫超三有妙法能除煩惱根獲成聖衆離欲尊我昔所作諸罪業今對三寶至誠懺回施功德利群生誓願求證菩提果時受法弟子誦此伽陀滿三遍已阿闍梨復為弟子隨力隨意開導説法令彼至誠發大菩提心然後如前依法作於供養發送賢聖時弟子於曼拏羅地右脅而臥於其夢中必見境像第二日阿闍梨用鮮淨五色線絣曼拏羅時阿闍梨觀想其線即真法界性遍照自性王如來即一切如來藏法界清淨故離諸塵垢能淨衆生界所用五色粉即五如來觀想已阿闍梨先下粉然後令弟子同作第一結界地第二與弟子受三歸第三令弟子入曼拏羅第四作發送法其曼拏羅有三品法上品千肘量中品五百肘下品五肘乃至二肘一肘其相四方作四門四樓中心作八輻輪安置遍照如來東方安阿閦佛南方安寶生佛西方安無量壽佛北方安不空成就佛復次於輪四隅安四親近菩薩東北隅安佛眼菩薩東南隅安摩摩枳菩薩西南隅安白衣菩薩西北隅安多羅菩薩復次於第二重曼拏羅安四菩薩東方安薩埵金剛菩薩南方寶金剛菩薩西方法金剛菩薩北方羯磨金剛菩薩復次於曼拏羅四隅安四菩薩東北隅安尊那菩薩東南隅安寶光菩薩西南隅安顰眉菩薩西北隅安金剛鎖菩薩復次於第三重曼拏羅安十六大菩薩東方位安四菩薩慈氏菩薩妙吉祥菩薩香象菩薩智幢菩薩南方位安四菩薩賢護菩薩海意菩薩無盡意菩薩辨積菩薩復次西方位安四菩薩得大勢至菩薩滅一切罪障菩薩破諸憂暗菩薩熾盛光菩薩復次北方位安四菩薩月光菩薩甘露光菩薩虛空藏菩薩除蓋障菩薩復次於曼拏羅東門安焰鬘得迦明王南門安鉢囉研得迦明王西門安鉢訥鬘得迦明王北門安尾覲難得迦明王復次於其四隅安四明王東北隅安不動尊明王東南隅安吒枳明王西南隅安儞羅難拏明王西北隅安大力明王復次於外曼拏羅外四隅中各安置一金剛杵內第一輪用白粉畫第二重曼拏羅用黃白青三色粉畫第三重曼拏羅用五色粉如是作大曼拏羅已然後為弟子受灌頂法復次別作二重曼拏羅四方作四門中心畫八葉蓮花於彼蓮花內東位安金剛杵南位安寶西位安蓮花北位安劍如是作曼拏羅已阿闍梨即自沐浴潔淨齋戒種種裝嚴於身時用閼伽瓶盛滿香水插諸花果枝葉以鮮淨衣蓋閼伽瓶阿闍梨依法加持其瓶入五寶五藥五穀香水充滿第一閼伽瓶名最勝瓶即是本尊餘有四瓶是即四親近菩薩及諸護門明王亦各有閼伽瓶若不隨諸賢聖位安置瓶者只置五瓶當用一切成就真言加持閼伽瓶以閼伽水灑淨諸衆生然後獻香花燈塗及種種飲食出生供養復次於曼拏羅四隅各安一閼伽瓶第一最勝瓶安置曼拏羅心中時阿闍梨以金剛鉤本印及誦真言請召諸佛如來入於曼拏羅時阿闍梨復想獻座諸佛如來於曼拏羅內各處本位而坐復次想曼拏羅外以金剛橛釘之而成結界即用閼伽水香花等供養各結本印時阿闍梨讚歎諸賢聖振金剛鈴獻種種音樂已勞謝諸佛賢聖告言我今求一切成就法言已令弟子入曼拏羅內時阿闍梨即誦五如來祕密真言安置弟子身分五處真言曰唵引一𡁠人際反曩爾入俱半音二唵引一嚩日囉二合特哩二合俱半音二唵引一囉怛曩二合特哩二合俱半音二唵引一阿嚕力俱半音二唵引一鉢囉二合倪也二合特哩二合俱半音二如是真言等各結本印安彼弟子五處以作甲胄時阿闍梨以帛覆弟子面引至壇前誦此伽陀曰一難覩曼拏朗娑引囕一嚩日囉二合倪也二合那寫鉢囉二合引鉢曩二鉢囉二合吠引始覩摩夜引室賒三薩哩嚩二合怛他引誐旦補囕四誦此伽陀已時令弟子結薩埵金剛印拋花於曼拏羅中誦此真言曰唵引一鉢囉二合帝引蹉嚩日囉二合呼二誦此真言已與去除覆面帛復誦此伽陀曰一難怛怛曼拏羅鉢舍一室囉二合馱引昧遨那味引那左二沒馱晚舍酤路半那引三母捺囉二合滿怛𡃤二合囉提瑟致二合旦四三半帝引薩哩嚩二引悉提引曩五三摩夜引機嚕二合引婆尾設底六嚩日囉二合鉢訥摩二合引屹囉二合邏里旦引七滿底哩二合引沙嚩二合引囉引達曩酤嚕八阿泥那紇哩二合那曳引那拽舍嚩日囉二合鉢旦底九誦伽陀已令弟子拋花花落之處當為本尊以香花燈塗衣服幢幡傘蓋印塵等殊妙供養復用微妙音樂吉祥偈讚時阿闍梨先用最勝閼伽瓶與弟子灌頂銷除塵垢後與四親近閼伽瓶灌頂已復誦吉祥偈讚告弟子言我今振鈴諸佛前諸佛遍滿如芥子諸佛受持閼伽瓶施汝灌頂妙法門心曼拏羅真實智如是觀想無相法汝今頂受此法門永出塵勞生死界時阿闍梨誦此吉祥讚已示於弟子設邏哥輪螺金剛杵經法乃至金銀等物皆為除彼蓋障若無設邏哥等物當結嚕必尼印示與弟子然後與三昧法三昧真言曰阿𭔞切身鉢囉二合勃哩二合底但網二合嚩蹉一𡁠引尾帝引哩馱二合悉體二合毗薩那引二薩達哩摩二合提唧旦左三阿引左引哩也二合摩嚩摩𭔞切身那引四嚩日囉二合婆引底哩二合數遨囉藐五訥瑟鵮二合昧帝哩二合尾囉引誐多引六鉢囉二合那引𭔞必帝引嚩蹉七那迦引哩也二合昧羯那引左那八伊帝引那訖哩二合帝引那吠沒馱引九那囉哥機嚕二合引播引多引野帝帝十時阿闍梨誦此三昧真言已勸化弟子令施財寶以報師恩或金銀琉璃摩尼真珠珊瑚琥珀乃至身命等復説頌曰弟子應當行孝順報荷闍梨令歡喜師若歡喜法得成此外世間無有尊時弟子聞此頌已從座而起供養諸佛及阿闍梨然後阿闍梨依法作護摩其護摩供養物持誦觀想法依息災增益等儀供養諸佛賢聖然後發送賢聖及三世諸佛已收彼壇中五色粉棄擲江河中於彼曼拏羅地以瞿摩夷塗之曼拏羅所用之物盡施阿闍梨弟子不得受若有受者當破三昧唯阿闍梨隨意受用佛説瑜伽大教王經真言品第三爾時世尊大遍照金剛如來復入轉真言輪金剛三摩地從此三摩地出已告金剛手大菩薩言汝今諦聽今此真言精妙字為汝演説志心受持時金剛手菩薩合掌向佛而白佛言世尊善説善逝善説為利益一切衆生故爾時世尊即説大遍照金剛如來根本真言曰唵引阿引復説阿閦如來真言曰唵引吽引寶生如來真言曰唵引怛囕二合無量壽如來真言曰唵引紇唎二合不空成就如來真言曰唵引亢引佛眼菩薩真言曰唵引誐誐那路左儞引吽引摩摩枳菩薩真言曰唵引枳哩枳哩摩引摩計吽引白衣菩薩真言曰唵引羯致引尾羯致引一儞羯致引一羯鵮羯致引二羯嚕吒尾哩曳二合引娑嚩二合引賀引三多羅菩薩真言曰唵引多引哩引咄多引哩引一咄哩引娑嚩二合引賀引二薩埵金剛菩薩真言曰唵引薩埵嚩日哩二合吽引寶金剛菩薩真言曰唵引囉怛曩二合嚩日哩二合引吽引法金剛菩薩真言曰唵引達哩摩二合嚩日哩二合引吽引羯磨金剛菩薩真言曰唵引羯哩摩二合嚩日哩二合引吽引尊那菩薩真言曰唵引左隸祖隸引一尊禰引娑嚩二合引賀引二寶光菩薩真言曰唵引囉怛努二合勒計二合引一囉怛曩二合入嚩二合引哩儞引娑嚩二合引賀引二顰眉菩薩真言曰唵引勃哩二合酤致引勃陵二合引金剛鎖菩薩真言曰唵引嚩日囉二合室哩二合朅里引一吽引發吒半音娑嚩二合引賀引二慈氏菩薩真言曰唵引昧引妙吉祥菩薩真言曰唵引蒙普賢菩薩真言曰唵引三滿多跋捺囉二合吽引香象菩薩真言曰唵引巘馱賀悉帝二合儞引吽引智幢菩薩真言曰唵引倪也二合引那計引覩一倪也二合引那摩底吽引二賢護菩薩真言曰唵引跋捺囉二合嚩底一跋捺囉二合播引羅吽引二海意菩薩真言曰唵引娑引誐哩引一摩賀引娑引誐哩引吽引二無盡意菩薩真言曰唵引惡叉曳引一吽吽引二惡叉野羯哩摩二合引嚩囉拏三尾輸達儞引娑嚩二合引賀引辨積菩薩真言曰唵引鉢囉二合底婆引儞引一鉢囉二合底婆引那酤致引吽引二得大勢至菩薩真言曰唵引娑他二合引弭引一摩賀引娑他二合引弭引二娑他二合引摩嚩底娑嚩二合引賀引三除一切罪障菩薩真言曰唵引薩哩嚩二合引播引野惹呬引一薩哩嚩二合引播引野輸引馱儞引吽引二破一切憂暗菩薩真言曰唵引薩哩嚩二合引輸引哥怛謨一儞哩伽二合引怛那末底吽引二熾盛光菩薩真言曰唵引惹引里儞引一摩賀引惹引里儞引吽引二善財菩薩真言曰唵引酥達那室哩二合引野吽引月光菩薩真言曰唵引贊捺哩二合引酥贊捺哩二合引一贊捺囉二合咩引嚩嚕吉帝娑嚩二合引賀引二甘露光菩薩真言曰唵引阿弭多鉢囉二合毗引一阿弭多末底吽引二虛空藏菩薩真言曰唵引誐誐儞引一誐誐那嚩囉嚕左儞引吽引二除蓋障菩薩真言曰唵引薩哩嚩二合引儞引嚩囉拏尾瑟剛二合鼻尼吽引復説焰鬘得迦明王真言曰唵引焰鬘引得迦吽引鉢囉二合研得迦明王真言曰唵引鉢囉二合研得迦吽引鉢訥鬘得迦明王真言曰唵引鉢訥鬘得迦吽引尾覲難得迦明王真言曰唵引阿密哩二合多軍拏里一尾覲難二合引得迦吽引二不動尊明王真言曰唵引阿左羅吽引賀引吒枳明王真言曰唵引吒枳吽引𠺁仁作反儞羅難拏明王真言曰唵引儞引羅難拏一摩賀引難拏吽引二大力明王真言曰唵引骨嚕馱那吽引𠺁上同如是等諸大菩薩及大明王精妙字真言安曼拏羅中如是所説無數俱胝精妙字等從三摩地生時阿闍梨依法觀想已用金剛鉤印請召諸佛如來用金剛印請召諸菩薩及諸賢聖用結輪印請召諸明王用結索印請召諸唧吒唧致用結鉤印請召訥多訥帝等此是瑜伽大教王請召儀則
