  - {type: punctuation, offset: 5247, content: 『, id: KR6j0058_T_001-bkkpn796}
  - {type: variant, offset: 5247, length: 404, content: '「『唵引薩哩嚩二合引播引野惹呬引一　薩哩嚩二合引＋（一）【明】引【大】，引一【明】引引一播引野輸引馱儞引吽引二』

      「破一切憂闇菩薩真言曰：

      「『唵引薩哩嚩二合引輸引哥怛謨＝護【三】謨【大】，護【宋】【元】【明】謨護一　儞哩伽二合引怛那末底吽引二』

      「熾盛光菩薩真言曰：

      「『唵引惹引里儞引一　摩賀引惹引里儞引吽引二』

      「善財菩薩真言曰：

      「『唵引酥＝蘇【明】酥【大】，蘇【明】酥蘇達那室哩二合引野吽引＋（一）【宋】【元】＊，（一句）【明】＊引【大】＊，引一【宋】【元】＊，引一句【明】＊引引一引一句』

      「月光菩薩真言曰：

      「『唵引贊捺哩二合引酥贊捺哩二合引一　贊捺囉二合咩引嚩嚕吉帝娑嚩二合引賀引二』

      「甘露光菩薩真言曰：

      「『唵引阿弭多鉢囉二合毘引一　阿弭多末底吽引二』

      「虛空藏菩薩真言曰：

      「『唵引誐誐儞引一　誐誐那嚩囉嚕左儞引吽引二』

      「除蓋障菩薩真言曰：

      「『唵引薩哩嚩二＝三【明】二【大】，三【明】二三合引儞引嚩囉拏尾瑟剛二合鼻尼吽引引一引一句』」

      復說：「焰鬘得迦明王真言曰：

      「『唵引焰鬘引得迦吽引引一引一句』

      「鉢囉二合研得迦明王真言曰：

      「『唵引鉢囉二合研得迦吽引引一引一句』

      「鉢訥鬘得迦明王真言曰：

      「『唵引鉢訥鬘得迦吽引引一引一句』

      「尾覲難得迦明王真言曰：

      「『唵引阿密＝蜜【元】密【大】，蜜【元】密蜜哩二合多軍拏里一＝二令一【明】一【大】，二合一【明】一二合一　尾覲難二合引得迦吽引二』

      「不動尊明王真言曰：

      「『唵引阿左羅吽引賀〔引〕－【三】引【大】，〔－〕【宋】【元】【明】引』

      「吒枳明王真言曰：

      「『唵引吒枳吽引𠺁仁作反切』

      「儞羅難拏明王真言曰：

      「『唵引儞引羅難拏一　摩賀引難拏吽引二』

      「大力明王真言曰：', 宮: ''}
