來無量壽如來不空成就如來大遍照如來等入金剛阿闍梨三昧相金剛三摩地從定出已告諸如來及彼菩薩言諦聽諦聽所有三世諸佛皆來詣阿闍梨所恭敬供養何以故此金剛阿闍梨即是一切如來智主爾時彼諸如來及諸菩薩聞佛說已白佛言世尊一切如來金剛身語心三密成就法當依何住佛言一切如來金剛身語心三密成就法當依金剛阿闍梨身語心住復次諸菩薩白佛言世尊此金剛阿闍梨身語心當依何住佛言當依虛空住菩薩白言虛空當依何住佛言依金剛阿闍梨心住菩薩白言心依何住佛言心本離相而無所住爾時諸菩薩等聞佛說已心念希有默然而住佛告諸菩薩言今此瑜伽大教有十種祕密真實之義一曼拏羅二三摩地三印相四行步五坐位六持誦七護摩八供養九本事十相應此之十法大智所生甚深祕密三世諸佛同共宣說若諸學法弟子及受灌頂者於阿闍梨恆行恭敬尊重供養所有三密瑜伽之教隨自根性依法受持展轉流傳利益安樂一切衆生佛言此瑜伽大教汝阿闍梨等勿得傳於無信根人及輕法愚癡之者若傳彼等法不成就及破三昧身壞命終墮大地獄若復有人不依此妙法甘露精進焚修是人不能除斷一切煩惱何況修諸苦行捨於頭目手足等若人於此教中隨修一法一行持誦精熟住於寂靜入三摩地能斷煩惱現證佛果佛說此經已諸菩薩等及天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等聞佛所說皆大歡喜信受奉行
