body:
  text: 西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯相應方便成就品第八爾時世尊大遍照金剛如來入一切如來智輪成就金剛三摩地從定出已說一切輪內外所作法此瑜伽大教王經所作曼拏羅隨於本尊名號連金剛出生稱曼拏羅名然後作息災增益敬愛降伏等法當以本尊及諸菩薩觀想持誦已即作此法若作息災法當依佛眼菩薩尊那菩薩若作增益法當依寶光菩薩白衣菩薩若作敬愛法當依多羅菩薩金剛鎖菩薩若作降伏法當依顰眉菩薩摩摩枳菩薩復次日前菩薩及鉢蘭拏舍嚩哩菩薩此二菩薩亦能除災若人依此持誦必得成就如是諸菩薩具大威力與佛無異能作一切成就之法時持誦者欲作身災法各觀想本字化成佛眼菩薩及尊那菩薩相好圓滿一切裝嚴手持甘露軍持及數珠以甘露軍持灌於災障人頂如自清涼能除熱惱時持誦者想於自身即遍照如來善能息除一切災障復次作增益法時阿闍梨觀想己身為寶生如來身相金色廣大圓滿復想寶光菩薩及白衣菩薩亦作金色以手持寶兼執蓮花降甘露雨及雨珍寶能作最上增益之法復次作敬愛法持誦者觀想無量壽佛身相赤色廣大圓滿復想多羅菩薩金剛鎖菩薩身亦赤色手持羂索及金剛鉤令人敬愛即以鉤索鉤牽如是依法速得敬愛復次作息災法持誦者觀想日前菩薩及鉢蘭那賒嚩哩菩薩遍滿虛空降甘露雨即得災障消除復次降伏法持誦者先想吽字化成不空成就佛身相緑色廣大圓滿復想顰眉菩薩及摩摩枳菩薩身相緑色遍身金剛光明現大忿怒相降大天火燒彼降人身而作驚怖相如是觀法相應經剎那間所降之人身得損壞乃至除滅復次薩埵金剛等四菩薩能與有情作灌頂法復有十六大菩薩於最上曼拏羅能作一切成就法復有諸大明王依法觀想能作降伏法復次作外降伏法持誦者取所降伏人足下土及河兩岸土尸灰尸衣以朅囉母怛囉同和為泥作所降人像復用芥子毒藥鹽泯母怛囉等同和塗彼像身已觀想彼像其心慌亂風吹在於虛空以金剛鉤鉤之以羂索繫縛稱所降人名用骨朵打以棘針遍身刺之復用人骨為橛或佉禰囉木橛於所降人像頭額臂心頸如是五處釘之即用利劍從足截斷用𩕳摩木柴燃火已現大忿怒相以所截形像於彼火內當作護摩作此法時或夜半或日中所降伏人乃至諸佛聖力尚不能救何況諸天而救護之復次作內降伏法持誦者依法先解除所降之人擁護已觀想諸天明王現忿怒相各持劍杖金剛杵搗杵羂索輪弓箭等以明王羂索縛降伏人牽往南方行次之間復有明王以金剛杵打之而作驚怖即以利劍開彼人腹出於腸胃已即誦此明王真言曰唵引吽引嚩日囉二合囉引叉娑一薄叉野薄叉野二誦此真言已復想金剛羅剎衆變為鴉野狐鷲鳥等悉來聚集食彼降人復想彼人乘於驝駝在風輪上向南行之復有明王隨後打擲如是觀想彼降伏人速得除滅復次辟除法持誦者依金剛舜拏明王相應法用旋風所吹樹葉上書真言及所降人名復取彼人足下土與所書葉同處用足踏之即誦本尊真言速得辟除乃至帝釋天不能救護何況諸凡人復次辟除法持誦者用獯狐翅上書真言及所降人名以淨行婆羅門髮纏之即誦真言加持密埋地中復想二大明王於彼打之次想吽字化成微小金剛杵入所降人身變成羯磨杵有大熾焰打彼降人身分肢節悉令乾枯又想諸金剛拏枳儞悉來唼所降人身血如是作法速得辟除誦此真言曰唵引嚩日囉二合拏引枳儞一阿目割寫囉訖多二合阿引羯哩沙二合野吽引發吒半音二誦此真言已依法相應彼降伏人速得身分乾枯乃至除滅復次降雨法持誦者往西北隅以香水塗四方曼拏羅已用塗香點七點圓如星相以淨器蓋覆持誦者觀想曼拏羅七點塗香成八角須彌山化金剛杵周匝遍滿復想野字成大風輪寂然不動如是依法能降大雨復次降雨法持誦者觀想八葉蓮花上有八大龍王所謂阿難多龍王酤哩哥龍王嚩酥枳龍王怛叉哥龍王摩賀鉢訥摩龍王羯哩酤吒哥龍王商珂播羅龍王鉢訥摩龍王如是龍王如是龍王各各依法色相裝嚴及執捉等一一觀想已於夜分中往四衢道用香水以左拇指塗四方曼拏羅於四隅中畫金剛鉤等時持誦者於曼拏羅前敷座而坐復想八大龍王真言與名同誦如是依法能降大雨復次降雨法持誦者想前八葉蓮花上有八大龍王蓮花中心有大忿怒明王身光熾盛化金翅鳥逼逐諸龍時持誦者誦吽吽字及龍王真言如是觀想持誦必降大雨復次止雨法持誦者觀想自身如三昧火於眉間化出不動尊明王遍身熾焰光明如日亦如大遍照如來身有六臂右手持劍金剛杵箭左手持輪羂索弓復想化諸明王及輪劍索弓箭金剛杵如雨滿空即誦本真言如是依法相應大雨即止及除魔怖復次除魔驚怖法持誦者用那囉嚕地囉及淨土相和作魔冤形像已誦橛真言二十一遍依日前菩薩法觀想頻那夜迦入於降伏人口以搗杵打之即誦杵真言曰唵引宋婆嚩日囉二合一母娑隸引那祖蘭拏二合野二那囉尾覲曩二合引吽引發吒半音三如是依法持誦一剎那中魔自驚怖退散馳走復次降雨法持誦者觀想帝釋天三面四臂身如月色乘八身千頭白象其象有千眼千牙右手執金剛杵左手持鈴安於腰側色相圓滿作大富貴相四天女圍繞在虛空中利樂衆生欲降甘雨告諸龍言汝速降雨復想金翅鳥逼諸龍王以觜啄之令降甘雨即誦此真言曰唵引嚩日囉二合拏引囉引野那儞哩嚩二合引鉢野一挽呬儞二合曼沒彌引枿引吽引二誦此真言已即降大雨如瓶瀉水復次真言曰唵引摩賀引穌珂嚩日囉二合底𠺁吽引一持誦者誦此真言作金剛縛依法觀想能成就最上利樂之事爾時世尊大遍照金剛如來說此真言觀想微妙真實法已心大歡喜顧視大衆而以大智調伏諸衆故持金剛杵入大樂三摩地從定出已以善方便引發大智故以二手如蓮花安於頂上從自眉間放大光明現身口意三密之相爾時阿閦佛寶生佛無量壽佛不空成就佛及十六大菩薩乃至一切諸大明王等入深法門通達三昧時金剛手菩薩摩訶薩合掌向佛白言世尊有何因緣放大光明普照衆會唯願世尊為我等說爾時大遍照金剛如來出大妙音告菩薩等言汝今諦聽當為汝說此之光相顯於甚深祕密觀想微妙法門有大利樂成就金剛大智證菩提道而說頌曰實相菩提非有無亦無二邊無中道離相寂靜如虛空三世諸佛何所證今說微妙大方便令彼悟入菩提心智離取捨觀諸蘊唯顯真空大道心最勝如來三身佛真心不向身中得一切諸法從心生所生諸法即菩提譬如幻師以幻心作彼種種幻化法如是皆從妄想生菩提心相亦如是金剛大智從心起善作無上菩提因煩惱疑惑染彼心隨順衆生根性說我見愚人分染淨不了四大假合身觀想無為真性空究竟成就大菩提爾時大遍照金剛如來說此頌已告金剛手菩薩言如是菩提本性清淨而有二義一非生煩惱諸蘊無實故二性如虛空思議不及故此真菩提諸佛共說若人觀想即住大智能作羯磨成就之法佛告金剛手菩薩若有持誦之者而常修習成就之法雖復勤求終難得成我今為汝說彼調伏之法於大樂方便速獲成就持誦者當依金剛鉤大菩薩法金剛羂索具大力金剛拳大猛利金剛橛能破壞金剛骨朵能捶打金剛哥梨印大勇猛如是等諸天見之悉皆驚怖此是佛之三昧若持誦者依法觀想誦於吽字發金剛鉤善入諸佛心見此三昧悉皆速來此法能請召諸佛菩薩何況凡夫衆生等時持誦者欲求成就作此降伏法觀想以金剛縛縛之以金剛哥利印作期剋相以金剛堅固拳揮打復用金剛橛釘彼五處頂額頸心臂以金剛骨朵而釘彼橛如是依法乃至大惡魔冤速自降伏最上成就必得圓滿佛果菩提不久克證爾時金剛手菩薩等一切大衆聞是祕密相應成就法已心大歡喜異口同音讚言善哉善哉世尊此大相應祕密深固幽遠能為衆生分別開示而說頌曰善哉無上大無畏遍照金剛大如來善說真實微妙法利益一切諸衆生大力金剛清淨鉤能入大智諸佛心成就金剛最上乘通達祕密無為相若人依法而勤修不久圓證菩提果時金剛手菩薩等說此頌已大遍照金剛如來即說金剛鉤等真言唵引嚩日囉二合引酤舍阿哥哩沙二合野吽引一唵引嚩日囉二合播舍滿馱吽引一唵引嚩日囉二合哥引里怛哩惹二合野吽引一唵引嚩日囉二合母瑟致二合仡哩二合恨拏二合引鉢野吽引一如是金剛鉤等真言清淨微妙具大威力利益無量若人依法持誦無不成就於金剛大智中最為殊勝不得傳於邪見等非法之人佛說瑜伽大教王經護摩品第九爾時世尊大遍照金剛如來復入一切成就法儀行相應金剛三摩地從定出已說入寤成就法時持誦者先於頂上想唵字口中想有阿字心中想有吽字復想嚩字化成風輪輪上有入寤者能說世間一切之事持誦者作貢高勢復想尊那菩薩即誦尊那菩薩真言曰那莫颯鉢多二合引曩引一三藐訖三二合沒馱酤致引曩引二怛𭔞切身他引三唵引左隸引四祖隸五尊禰引娑嚩二合引賀引六摩賀引尾哩曳二合引七阿鉢囉二合底曷多舍引娑儞引八摩賀引末羅鉢囉二合訖囉二合彌引九遏西播引舍鉢囉輸十仡哩二合係多曷悉帝二合引十一摩賀引骨嚕二合引提引說哩十二沃仡囉二合嚕閉引十三阿難多母契引十四薩賀引薩囉二合部𡁠引十五阿𡁠帝引十六阿波囉引𡁠帝引十七阿具哩引十八訥哩那二合彌引十九薩賀娑囉二合惡翅引二十薩哩嚩二合怛他引誐多阿地瑟吒二合引那阿地瑟恥二合帝引二十一薩哩嚩二合禰引嚩多引曩引二十二滿禰多布𡁠帝引二十三鉢囉二合娑引提帝引二十四嚩日囉二合具尼引二十五嚩日哩二合引嚩日囉二合引嚩係引二十六嚩日囉二合引欲提引二十七嚩日囉二合哥引彌儞引二十八嚩日嚕二合引儞彌二合引里多引翅引二十九惡叉曳引三十遏具哩引三十一具囉嚕必尼三十二尾訖哩二合多捺哩舍二合儞引三十三嚩日囉二合吠引女哩也二合引朗訖哩二合多設哩引㘑引三十四唵引婆誐嚩底尊禰引三十五訥龍二合訥龍二合三十六咄龍二合咄龍二合三十七沒龍二合沒龍二合三十八窣龍二合窣龍二合三十九龍龍四十仡哩二合恨拏二合仡哩二合恨拏二合四十一阿引吠引舍野阿引吠引舍野四十二仡哩二合恨拏二合引鉢野四十三仡哩二合恨拏二合引鉢野四十四訶囉訶囉四十五娑囉娑囉四十六摩引囉野摩引囉野四十七訶那訶那四十八畔惹畔惹四十九摩囉摩囉五十摩引囉野摩引囉野五十一鉢左鉢左五十二那賀那賀五十三仡哩二合恨拏二合仡哩二合恨拏二合五十四噎那訥瑟吒二合誐囉二合㰠五十五入嚩二合囕伊哥引係剛五十六禰尾二合係剛五十七底囉也三合引係剛五十八左引覩哩他二合剛五十九禰爹入嚩二合囕六十母虎哩底二合剛六十一誐囉二合賀怖多尾多引拏六十二藥叉犖叉桑六十三酤瑟二合引𧹞六十四喻儞𭨚六十五羯哩摩二合𭨚六十六娑他二合引嚩囕六十七𭨚誐忙六十八曳𤚥馨散底計唧訥瑟吒二合六十九當引薩哩嚩二合引七十娑達野娑達野七十一末哩那二合野末哩那野七十二輸沙野輸沙野七十三多引鉢野多引鉢野七十四嗢蹉引那野嗢蹉引那野七十五曷那曷那嚩日哩二合拏七十六娑囉娑囉難尼引那七十七摩引囉野摩引囉野朅尼擬二合引那七十八吽引吽引吽引